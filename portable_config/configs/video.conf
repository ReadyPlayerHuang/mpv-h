# Rendering backend
profile=high-quality
vo=gpu-next
gpu-api=d3d11

# Keep display handling neutral for different refresh rates, VRR setups, and
# multi-monitor systems. On the author's 240 Hz display, the line below can be
# useful if mpv misdetects refresh rate.
# display-fps-override=240

# Hardware decoding is useful for shader upscaling on the author's machine.
# The RIFE toggle script disables it while VapourSynth interpolation is active.
hwdec=auto-safe

# Rendering quality
cscale=catmull_rom
deband=yes
icc-profile-auto=yes
blend-subtitles=video

# Display-resample interpolation can reduce cadence judder, but it may add
# load on high-refresh displays. RIFE TensorRT is handled separately.
# video-sync=display-resample
# interpolation=yes
# tscale=oversample
video-sync=audio
interpolation=no

# Optional workaround for an observed gpu-next/DXGI color-handling issue on
# the author's setup. Leave disabled unless you see incorrect color handling.
# target-colorspace-hint=no
